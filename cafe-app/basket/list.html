<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>장바구니 - Cafe App</title>
    <!-- Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="list.css">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
    <header class="app-header">
        <button class="back-btn" onclick="history.back()"><i class="ph ph-arrow-left"></i></button>
        <h1>장바구니</h1>
        <div style="width:24px"></div> <!-- 중앙 정렬용 빈 공간 -->
    </header>

    <main class="basket-container">
        <ul id="basket-items" class="basket-list fade-in">
            <!-- JS에서 동적으로 아이템 렌더링 -->
        </ul>
        
        <div class="checkout-section fade-in delay-1">
            <div class="summary-row total">
                <span>총 결제 금액</span>
                <span id="total-price">0원</span>
            </div>
            <button class="btn btn-primary btn-block">주문하기</button>
        </div>
    </main>
    <script src="list.js"></script>
</body>
</html>
