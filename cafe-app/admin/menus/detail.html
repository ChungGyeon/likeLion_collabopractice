<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>메뉴 상세 및 수정 - 카페 관리자</title>
    <link rel="stylesheet" href="./detail.css">
</head>
<body>
<div class="dashboard-container">
    <!-- 사이드바 -->
    <aside class="sidebar">
        <div class="logo">Cafe Admin</div>
        <nav>
            <ul>
                <li><a href="../../index.html">대시보드 홈</a></li>
                <li><a href="#">실시간 주문 목록</a></li>
                <li><a href="list.html" class="active">메뉴 관리 (목록)</a></li>
                <li><a href="create.html">새 메뉴 추가</a></li>
            </ul>
        </nav>
    </aside>

    <!-- 메인 콘텐츠 -->
    <main class="main-content">
        <header class="top-header">
            <h1>메뉴 상세 및 옵션 수정</h1>
            <div class="user-info">관리자님, 환영합니다</div>
        </header>

        <div class="card form-container">
            <form id="editMenuForm">
                <h2>기본 정보</h2>
                <div class="form-group row">
                    <div class="input-field">
                        <label for="category">카테고리 <span class="required">*</span></label>
                        <select id="category" required>
                            <option value="커피">커피</option>
                            <option value="음료">음료</option>
                            <option value="디저트">디저트</option>
                            <option value="베이커리">베이커리</option>
                        </select>
                    </div>
                    <div class="input-field">
                        <label for="status">판매 상태 <span class="required">*</span></label>
                        <select id="status" required>
                            <option value="판매중">판매중</option>
                            <option value="품절">품절</option>
                            <option value="숨김">숨김</option>
                        </select>
                    </div>
                </div>

                <div class="form-group row">
                    <div class="input-field">
                        <label for="menuName">메뉴 이름 <span class="required">*</span></label>
                        <input type="text" id="menuName" required>
                    </div>
                    <div class="input-field">
                        <label for="price">기본 가격 (원) <span class="required">*</span></label>
                        <input type="number" id="price" required>
                    </div>
                </div>

                <hr class="divider">

                <h2>고객 선택 옵션 설정</h2>
                <p class="section-desc">고객이 앱에서 이 메뉴를 주문할 때 선택할 수 있는 옵션들을 활성화하세요.</p>

                <div class="options-grid">
                    <label class="option-card">
                        <input type="checkbox" name="detailOptions" value="TEMP_ICE">
                        <div class="option-content">
                            <span class="option-title">🧊 ICE 가능</span>
                            <span class="option-desc">아이스 음료로 주문 가능</span>
                        </div>
                    </label>

                    <label class="option-card">
                        <input type="checkbox" name="detailOptions" value="TEMP_HOT">
                        <div class="option-content">
                            <span class="option-title">☕️ HOT 가능</span>
                            <span class="option-desc">따뜻한 음료로 주문 가능</span>
                        </div>
                    </label>

                    <label class="option-card">
                        <input type="checkbox" name="detailOptions" value="ICE_AMOUNT">
                        <div class="option-content">
                            <span class="option-title">❄️ 얼음량 조절</span>
                            <span class="option-desc">적게 / 보통 / 많이 선택</span>
                        </div>
                    </label>

                    <label class="option-card">
                        <input type="checkbox" name="detailOptions" value="SHOT_ADD">
                        <div class="option-content">
                            <span class="option-title">☕️ 샷 추가</span>
                            <span class="option-desc">+500원 선택지 제공</span>
                        </div>
                    </label>

                    <label class="option-card">
                        <input type="checkbox" name="detailOptions" value="SYRUP_ADD">
                        <div class="option-content">
                            <span class="option-title">🍯 시럽 추가</span>
                            <span class="option-desc">바닐라/헤이즐넛 추가 제공</span>
                        </div>
                    </label>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn-cancel" onclick="location.href='list.html'">취소</button>
                    <button type="submit" class="btn-submit">변경사항 저장</button>
                </div>
            </form>
        </div>
    </main>
</div>

<script src="./detail.js"></script>
</body>
</html>
