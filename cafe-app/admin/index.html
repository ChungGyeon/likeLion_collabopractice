<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카페 관리자 대시보드</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
<div class="dashboard-container">
    <!-- 사이드바 네비게이션 -->
    <aside class="sidebar">
        <div class="logo">Cafe Admin</div>
        <nav>
            <ul>
                <li><a href="#" class="active">대시보드 홈</a></li>
                <li><a href="#">실시간 주문 목록</a></li>
                <li><a href="#">메뉴 관리 (목록/상세)</a></li>
                <li><a href="#">새 메뉴 추가</a></li>
            </ul>
        </nav>
    </aside>

    <!-- 메인 콘텐츠 영역 -->
    <main class="main-content">
        <header class="top-header">
            <h1>대시보드</h1>
            <div class="user-info">관리자님, 환영합니다</div>
        </header>

        <!-- 통계 요약 카드 -->
        <section class="stats-grid">
            <div class="stat-card">
                <h3>오늘의 주문</h3>
                <p class="stat-value">120건</p>
            </div>
            <div class="stat-card">
                <h3>오늘의 매출</h3>
                <p class="stat-value">₩540,000</p>
            </div>
            <div class="stat-card">
                <h3>활성 메뉴</h3>
                <p class="stat-value">24개</p>
            </div>
        </section>

        <!-- 하단 상세 섹션 (그리드 분할) -->
        <section class="content-sections">
            <!-- 퀵 액션 -->
            <div class="card">
                <h2>빠른 실행</h2>
                <div class="action-buttons">
                    <button class="action-btn">새 메뉴 추가하기</button>
                    <button class="action-btn outline">품절/숨김 처리하기</button>
                </div>
            </div>

            <!-- 최근 주문 테이블 -->
            <div class="card table-container">
                <h2>최근 접수된 주문</h2>
                <table class="data-table">
                    <thead>
                    <tr>
                        <th>주문 번호</th>
                        <th>주문 내역</th>
                        <th>상태</th>
                        <th>주문 시간</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr>
                        <td>#1042</td>
                        <td>아이스 아메리카노 외 2건</td>
                        <td><span class="badge pending">준비 중</span></td>
                        <td>10:42 AM</td>
                    </tr>
                    <tr>
                        <td>#1041</td>
                        <td>카페 라떼 (시럽 추가)</td>
                        <td><span class="badge completed">제조 완료</span></td>
                        <td>10:35 AM</td>
                    </tr>
                    <tr>
                        <td>#1040</td>
                        <td>초코무스 케이크</td>
                        <td><span class="badge completed">픽업 완료</span></td>
                        <td>10:15 AM</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>
</div>
</body>
</html>
